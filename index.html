<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temuulen Buuveibaatar — Developer & Flight Sim Geek</title>
<meta name="description" content="Website and application developer, aircraft sim geek with 10,000+ hours. React, Next.js, React Native. Based in Mongolia & China.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rose-bg:#F6E4E8; --paper:#FBF7F4; --paper-2:#F4ECE7;
    --ink:#3A2A2E; --ink-2:#6E5A5E; --ink-3:#A38E91;
    --wine:#8E3B52; --wine-deep:#6E2A3E; --gold:#C9A24B; --blush:#E7B8C2;
    --line:rgba(142,59,82,.16); --line-2:rgba(142,59,82,.28);
    --disp:"Fraunces",Georgia,serif;
    --body:"Inter",system-ui,sans-serif;
    --cn:"Noto Sans SC",system-ui,sans-serif;
    --maxw:1120px; --bg-image:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{background:var(--rose-bg);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body.lang-cn{font-family:var(--cn)}
  body.lang-cn .disp,body.lang-cn h1,body.lang-cn h2,body.lang-cn h3,body.lang-cn h4{font-family:var(--cn)!important;font-style:normal!important}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition-duration:.001ms!important}}
  ::selection{background:var(--blush);color:var(--wine-deep)}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
  .disp{font-family:var(--disp)}

  /* lace backdrop */
  .lace-bg{position:fixed;inset:0;z-index:0;background-color:var(--rose-bg);background-image:var(--bg-image);background-size:440px auto;background-repeat:repeat;opacity:1}
  .lace-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 0%,rgba(251,247,244,.35),transparent 60%)}
  #app{position:relative;z-index:2}

  .reveal{opacity:0;transform:translateY(18px);transition:opacity .8s cubic-bezier(.2,.8,.2,1),transform .8s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:none}

  .btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--body);font-size:14px;font-weight:600;letter-spacing:.01em;padding:13px 24px;cursor:pointer;border:1px solid var(--wine);background:transparent;color:var(--wine);transition:all .22s;border-radius:999px}
  .btn svg{width:16px;height:16px}
  .btn:hover{background:var(--wine);color:#fff}
  .btn-fill{background:var(--wine);color:#fff}
  .btn-fill:hover{background:var(--wine-deep);border-color:var(--wine-deep);transform:translateY(-2px)}

  /* nav */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:all .35s}
  nav .bar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:20px 0}
  nav.on{background:rgba(251,247,244,.82);backdrop-filter:blur(14px) saturate(1.1);-webkit-backdrop-filter:blur(14px) saturate(1.1);border-bottom:1px solid var(--line)}
  nav.on .bar{padding:13px 0}
  .ident{display:flex;align-items:center;gap:11px;cursor:pointer}
  .ident .mono{width:34px;height:34px;border-radius:50%;background:var(--wine);color:#fff;display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:15px;font-style:italic}
  .ident .nm{font-family:var(--disp);font-size:19px;font-weight:600;letter-spacing:.01em}
  .navlinks{display:flex;align-items:center;gap:26px}
  .navlinks a{font-size:14px;color:var(--ink-2);cursor:pointer;position:relative;padding:4px 0;transition:color .2s}
  .navlinks a::after{content:"";position:absolute;left:0;right:100%;bottom:-1px;height:1.5px;background:var(--wine);transition:right .3s cubic-bezier(.2,.8,.2,1)}
  .navlinks a:hover{color:var(--wine)} .navlinks a:hover::after{right:0}
  .navtools{display:flex;align-items:center;gap:8px}
  .lang{display:flex;border:1px solid var(--line-2);border-radius:999px;overflow:hidden}
  .lang button{font-family:var(--body);font-size:12.5px;font-weight:600;background:none;border:none;color:var(--ink-2);cursor:pointer;padding:7px 12px;transition:all .2s}
  .lang button.on{background:var(--wine);color:#fff}
  .tool{width:38px;height:38px;border:1px solid var(--line-2);background:rgba(255,255,255,.4);color:var(--wine);cursor:pointer;display:grid;place-items:center;border-radius:50%;transition:all .22s}
  .tool:hover{background:var(--wine);color:#fff;border-color:var(--wine)}
  .tool svg{width:16px;height:16px}
  .burger{display:none}

  /* hero */
  header.hero{min-height:100svh;display:flex;align-items:center;padding:130px 0 70px;position:relative}
  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:56px;align-items:center;width:100%}
  .kicker{display:inline-flex;align-items:center;gap:10px;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--wine);font-weight:600;margin-bottom:22px}
  .kicker::before{content:"";width:30px;height:1px;background:var(--wine);opacity:.5}
  body.lang-cn .kicker{letter-spacing:.05em;text-transform:none}
  .hero h1{font-family:var(--disp);font-weight:600;font-size:clamp(46px,7.4vw,88px);line-height:1.0;letter-spacing:-.02em}
  .hero h1 em{font-style:italic;color:var(--wine);font-weight:500}
  .hero-lead{font-size:clamp(17px,2vw,20px);color:var(--ink-2);max-width:46ch;margin-top:24px}
  .hero-cta{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap}
  .hero-meta{display:flex;gap:26px;margin-top:38px;flex-wrap:wrap}
  .hero-meta .m .v{font-family:var(--disp);font-size:28px;font-weight:600;color:var(--wine);line-height:1}
  .hero-meta .m .v em{font-style:normal}
  .hero-meta .m .k{font-size:12.5px;color:var(--ink-3);margin-top:5px}

  /* portrait card */
  .portrait{position:relative;justify-self:center}
  .portrait .frame{width:min(360px,80vw);aspect-ratio:4/5;border-radius:200px 200px 18px 18px;overflow:hidden;background:var(--paper-2);box-shadow:0 30px 70px -28px rgba(142,59,82,.45);border:6px solid var(--paper)}
  .portrait .frame img{width:100%;height:100%;object-fit:cover;display:block}
  .portrait .frame .ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--ink-3);text-align:center;padding:24px}
  .portrait .frame .ph svg{width:46px;height:46px;opacity:.6}
  .portrait .frame .ph span{font-size:13.5px;max-width:22ch}
  .portrait .badge{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:var(--wine);color:#fff;font-family:var(--disp);font-style:italic;font-size:15px;padding:9px 20px;border-radius:999px;white-space:nowrap;box-shadow:0 12px 26px -10px rgba(142,59,82,.6)}
  .portrait .setphoto{position:absolute;top:12px;right:12px;background:rgba(251,247,244,.92);border:1px solid var(--line-2);color:var(--wine);font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;display:none;align-items:center;gap:6px}
  body.editing .portrait .setphoto{display:inline-flex}
  .portrait .setphoto svg{width:13px;height:13px}

  /* sections */
  section{padding:92px 0;position:relative}
  .card{background:rgba(251,247,244,.92);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:24px;padding:56px;box-shadow:0 24px 60px -34px rgba(142,59,82,.4)}
  .eyebrow{display:flex;align-items:center;gap:13px;margin-bottom:14px}
  .eyebrow .n{font-family:var(--disp);font-style:italic;font-size:16px;color:var(--wine)}
  .eyebrow .t{font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3)}
  body.lang-cn .eyebrow .t{letter-spacing:.08em;text-transform:none}
  .sec-h{font-family:var(--disp);font-weight:600;font-size:clamp(28px,4vw,46px);line-height:1.06;letter-spacing:-.01em;max-width:20ch}
  .sec-h em{font-style:italic;color:var(--wine)}
  .sec-sub{font-size:18px;color:var(--ink-2);margin-top:14px;max-width:56ch}

  /* about */
  .about{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:start}
  .about-body p{font-size:18px;line-height:1.75;color:var(--ink-2);margin-bottom:18px}
  .about-body p:first-of-type{font-size:20px;color:var(--ink)}
  .about-body p:first-of-type::first-letter{font-family:var(--disp);font-weight:600;font-size:3em;line-height:.8;float:left;padding:8px 12px 0 0;color:var(--wine)}
  body.lang-cn .about-body p:first-of-type::first-letter{font-size:1em;float:none;padding:0}
  .specs{border-top:1px solid var(--line)}
  .spec{display:flex;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .spec .k{font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
  body.lang-cn .spec .k{text-transform:none}
  .spec .v{font-size:15px;color:var(--ink);text-align:right;font-weight:500}

  /* services */
  .svc{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;margin-top:44px}
  .svc-card{background:rgba(251,247,244,.92);border:1px solid var(--line);border-radius:18px;padding:30px;transition:transform .3s,box-shadow .3s,border-color .3s}
  .svc-card:hover{transform:translateY(-4px);box-shadow:0 22px 44px -26px rgba(142,59,82,.5);border-color:var(--line-2)}
  .svc-card .no{font-family:var(--disp);font-style:italic;font-size:15px;color:var(--wine);opacity:.7}
  .svc-card h3{font-family:var(--disp);font-weight:600;font-size:23px;margin:8px 0 8px;letter-spacing:-.01em}
  .svc-card p{font-size:15px;color:var(--ink-2);line-height:1.6}
  @media(max-width:680px){.svc{grid-template-columns:1fr}}

  /* credentials */
  .cred{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:8px}
  .colh{font-family:var(--disp);font-style:italic;font-size:18px;color:var(--wine);border-bottom:1px solid var(--line-2);padding-bottom:12px;margin-bottom:6px}
  .entry{padding:18px 0;border-bottom:1px solid var(--line)}
  .entry .yr{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--wine);font-weight:600}
  body.lang-cn .entry .yr{text-transform:none}
  .entry h4{font-family:var(--disp);font-size:20px;font-weight:600;margin:4px 0 2px}
  .entry .org{font-size:14px;color:var(--ink-2)}
  .entry p{font-size:14px;color:var(--ink-3);margin-top:6px;line-height:1.55}
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
  .chip{font-size:13px;padding:7px 14px;border:1px solid var(--line-2);color:var(--wine);border-radius:999px;background:rgba(255,255,255,.4);transition:all .2s}
  .chip:hover{background:var(--wine);color:#fff;border-color:var(--wine)}
  @media(max-width:680px){.cred{grid-template-columns:1fr;gap:30px}}

  /* quote */
  .quote{text-align:center;max-width:760px;margin:0 auto}
  .quote .mark{font-family:var(--disp);font-style:italic;font-size:64px;color:var(--blush);line-height:.4;display:block;margin-bottom:10px}
  .quote blockquote{font-family:var(--disp);font-weight:500;font-size:clamp(22px,3.2vw,32px);line-height:1.32;letter-spacing:-.01em;color:var(--ink)}
  .quote blockquote em{font-style:italic;color:var(--wine)}
  .quote .by{margin-top:22px;font-size:14px;color:var(--ink-3);letter-spacing:.04em}

  /* contact */
  .contact{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
  .contact h2{font-family:var(--disp);font-weight:600;font-size:clamp(32px,4.8vw,56px);line-height:1.02;letter-spacing:-.02em}
  .contact h2 em{font-style:italic;color:var(--wine)}
  .contact .lead{font-size:18px;color:var(--ink-2);margin-top:16px;max-width:40ch}
  .freq{display:flex;flex-direction:column}
  .freq a{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--line);transition:padding .25s,color .25s}
  .freq a:first-child{border-top:1px solid var(--line-2)}
  .freq a:hover{padding-left:8px;color:var(--wine)}
  .freq a .k{font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  body.lang-cn .freq a .k{text-transform:none}
  .freq a .v{font-size:15px;font-weight:500}
  @media(max-width:760px){.contact{grid-template-columns:1fr;gap:30px}}

  footer{padding:40px 0 56px}
  .foot{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:26px}
  .foot .b{font-family:var(--disp);font-style:italic;font-size:18px;color:var(--wine)}
  .foot .meta{font-size:12.5px;color:var(--ink-3);display:flex;gap:11px;flex-wrap:wrap;align-items:center}
  .foot .meta .sep{opacity:.4}
  .owner-link{cursor:pointer;border-bottom:1px solid var(--line-2);transition:all .2s}
  .owner-link:hover{color:var(--wine);border-color:var(--wine)}

  /* editing */
  body.editing [data-edit]{outline:1.5px dashed rgba(142,59,82,.45);outline-offset:4px;cursor:text;border-radius:3px;transition:background .2s,outline-color .2s}
  body.editing [data-edit]:hover{outline-color:var(--wine);background:rgba(231,184,194,.25)}
  body.editing [data-edit]:focus{outline:1.5px solid var(--wine);background:rgba(231,184,194,.35)}
  .ebar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(160%);z-index:300;background:rgba(251,247,244,.96);backdrop-filter:blur(16px);border:1px solid var(--line-2);color:var(--ink);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;max-width:calc(100vw - 22px);transition:transform .5s cubic-bezier(.2,.9,.2,1);box-shadow:0 24px 60px -20px rgba(142,59,82,.5);border-radius:999px}
  .ebar.show{transform:translateX(-50%) translateY(0)}
  .ebar .tg{font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:0 10px;display:flex;align-items:center;gap:7px;color:var(--ink-2);font-weight:600}
  .ebar .tg .p{width:7px;height:7px;border-radius:50%;background:#5BBE8B;box-shadow:0 0 0 0 #5BBE8B;animation:pl 2s infinite}
  @keyframes pl{70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .ebar .eb{font-family:var(--body);font-size:13px;font-weight:600;padding:9px 15px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:7px;transition:all .2s;background:rgba(142,59,82,.1);color:var(--wine);border-radius:999px}
  .ebar .eb svg{width:14px;height:14px}.ebar .eb:hover{background:rgba(142,59,82,.2)}
  .ebar .eb.save{background:var(--wine);color:#fff}.ebar .eb.save:hover{background:var(--wine-deep)}
  .ebar .eb.out{background:transparent;color:var(--ink-3)}.ebar .eb.out:hover{background:rgba(142,59,82,.1)}

  .scrim{position:fixed;inset:0;background:rgba(58,42,46,.5);backdrop-filter:blur(5px);z-index:400;display:grid;place-items:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{background:var(--paper);border:1px solid var(--line-2);padding:32px;width:100%;max-width:440px;box-shadow:0 40px 90px -30px rgba(142,59,82,.55);transform:translateY(14px) scale(.97);transition:transform .35s cubic-bezier(.2,.9,.2,1);max-height:88vh;overflow:auto;border-radius:20px}
  .scrim.show .modal{transform:none}
  .modal .em{font-family:var(--disp);font-style:italic;font-size:15px;color:var(--wine);margin-bottom:6px}
  .modal h3{font-family:var(--disp);font-size:25px;font-weight:600;margin-bottom:8px}
  .modal p{font-size:14px;color:var(--ink-2);margin-bottom:18px;line-height:1.55}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;color:var(--ink-2)}
  .field input{width:100%;padding:13px 14px;border:1px solid var(--line-2);background:#fff;color:var(--ink);font-family:var(--body);font-size:15px;outline:none;transition:all .2s;border-radius:10px}
  .field input:focus{border-color:var(--wine);box-shadow:0 0 0 3px rgba(142,59,82,.15)}
  .rowf{display:flex;gap:10px;margin-top:8px}.rowf .btn{flex:1;justify-content:center}
  .errm{color:#B23A52;font-size:13px;margin:-2px 0 12px}
  .note{font-size:12px;color:var(--ink-3);margin-top:16px;text-align:center;line-height:1.55}
  .drop{border:1.5px dashed var(--line-2);padding:26px 20px;text-align:center;cursor:pointer;transition:all .25s;border-radius:14px;margin-bottom:14px}
  .drop:hover,.drop.over{border-color:var(--wine);background:rgba(231,184,194,.2)}
  .drop svg{width:30px;height:30px;color:var(--ink-3);margin-bottom:10px}
  .drop .t{font-size:14px;color:var(--ink);font-weight:600}
  .drop .s{font-size:12.5px;color:var(--ink-3);margin-top:5px}

  .toast{position:fixed;top:84px;left:50%;transform:translateX(-50%) translateY(-160%);z-index:500;background:var(--wine);color:#fff;padding:11px 20px;font-size:14px;font-weight:500;transition:transform .45s cubic-bezier(.2,.9,.2,1);display:flex;align-items:center;gap:9px;box-shadow:0 20px 50px -16px rgba(142,59,82,.6);border-radius:999px}
  .toast.show{transform:translateX(-50%) translateY(0)}.toast svg{width:16px;height:16px}

  .mmenu{position:fixed;inset:0;z-index:99;background:rgba(251,247,244,.98);backdrop-filter:blur(20px);transform:translateX(100%);transition:transform .45s cubic-bezier(.2,.9,.2,1);display:flex;flex-direction:column;justify-content:center;padding:44px;gap:2px}
  .mmenu.show{transform:none}
  .mmenu a{font-family:var(--disp);font-size:30px;font-weight:600;padding:14px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .mmenu .mx{position:absolute;top:24px;right:24px;width:42px;height:42px;border:1px solid var(--line-2);background:none;color:var(--wine);display:grid;place-items:center;border-radius:50%;cursor:pointer}
  .mmenu .mx svg{width:18px;height:18px}

  @media(max-width:880px){
    .navlinks{display:none}.burger{display:grid}
    .hero-grid{grid-template-columns:1fr;gap:40px}.portrait{order:-1}
    .about{grid-template-columns:1fr;gap:30px}
    .card{padding:34px 26px}
    section{padding:66px 0}
  }
  @media(max-width:520px){.wrap{padding:0 20px}.hero-meta{gap:18px}}
</style>
</head>

  let data = load() || JSON.parse(JSON.stringify(DEFAULT));

  function load(){try{const r=localStorage.getItem(K_DATA);if(r)return merge(JSON.parse(JSON.stringify(DEFAULT)),JSON.parse(r));}catch(e){}return null;}
  function merge(base,ov){if(Array.isArray(base)||typeof base!=='object'||base===null)return ov===undefined?base:ov;for(const k in ov){if(typeof base[k]==='object'&&typeof ov[k]==='object'&&!Array.isArray(base[k]))merge(base[k],ov[k]);else base[k]=ov[k];}return base;}
  function save(){try{localStorage.setItem(K_DATA,JSON.stringify(data));return true;}catch(e){return false;}}
  function loadLang(){try{return localStorage.getItem(K_LANG)||'en';}catch(e){return 'en';}}
  function saveLang(l){try{localStorage.setItem(K_LANG,l);}catch(e){}}
  function getPw(){try{return localStorage.getItem(K_PW);}catch(e){return null;}}
  function setPw(h){try{localStorage.setItem(K_PW,h);}catch(e){}}
  function getPhoto(){try{return localStorage.getItem(K_PHOTO)||"";}catch(e){return "";}}
  function setPhoto(v){try{v?localStorage.setItem(K_PHOTO,v):localStorage.removeItem(K_PHOTO);}catch(e){}}
  async function sha(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}

          <button class="setphoto" onclick="photoModal()">${I.cam} ${lang==='cn'?'照片':'Photo'}</button>
        </div>
        <span class="badge"${ed('hero.badge')}>${esc(tr(d.hero.badge))}</span>
      </div>
    </div></div></header>

    <section id="sec-about"><div class="wrap"><div class="card reveal">
      <div class="eyebrow"><span class="n">${esc(d.about.n)}</span><span class="t">${esc(tr(d.about.t))}</span></div>
      <h2 class="sec-h"${ed('about.h')}>${esc(tr(d.about.h))}</h2>
      <p class="sec-sub"${ed('about.sub')}>${esc(tr(d.about.sub))}</p>
      <div class="about" style="margin-top:36px">
        <div class="about-body">
          <p${ed('about.p1')}>${esc(tr(d.about.p1))}</p>
          <p${ed('about.p2')}>${esc(tr(d.about.p2))}</p>
          <p${ed('about.p3')}>${esc(tr(d.about.p3))}</p>
        </div>
        <div class="specs">${d.about.specs.map((s,i)=>`
          <div class="spec"><span class="k"${ed('about.specs.'+i+'.k')}>${esc(tr(s.k))}</span><span class="v"${ed('about.specs.'+i+'.v')}>${esc(tr(s.v))}</span></div>`).join('')}</div>
      </div>
    </div></div></section>

    <section id="sec-work"><div class="wrap">
      <div class="eyebrow reveal"><span class="n">${esc(d.work.n)}</span><span class="t">${esc(tr(d.work.t))}</span></div>
      <h2 class="sec-h reveal"${ed('work.h')}>${esc(tr(d.work.h))}</h2>
      <p class="sec-sub reveal"${ed('work.sub')}>${esc(tr(d.work.sub))}</p>
      <div class="svc">${d.work.items.map((w,i)=>`
        <div class="svc-card reveal"><div class="no">${esc(w.no)}</div><h3${ed('work.items.'+i+'.t')}>${esc(tr(w.t))}</h3><p${ed('work.items.'+i+'.p')}>${esc(tr(w.p))}</p></div>`).join('')}</div>
    </div></section>

    <section id="sec-cred"><div class="wrap"><div class="card reveal">
      <div class="eyebrow"><span class="n">${esc(d.cred.n)}</span><span class="t">${esc(tr(d.cred.t))}</span></div>
      <h2 class="sec-h"${ed('cred.h')}>${esc(tr(d.cred.h))}</h2>
      <p class="sec-sub"${ed('cred.sub')}>${esc(tr(d.cred.sub))}</p>
      <div class="cred">
        <div>
          <div class="colh"${ed('cred.left.label')}>${esc(tr(d.cred.left.label))}</div>
          ${d.cred.left.items.map((e,i)=>entryHTML('cred.left.items.'+i,e)).join('')}
        </div>
        <div>
          <div class="colh"${ed('cred.right.label')}>${esc(tr(d.cred.right.label))}</div>
          ${d.cred.right.items.map((e,i)=>entryHTML('cred.right.items.'+i,e)).join('')}
          <div class="chips">${d.cred.chips.map((c,i)=>`<span class="chip"${ed('cred.chips.'+i)}>${esc(c)}</span>`).join('')}</div>
        </div>
      </div>
    </div></div></section>

    <section><div class="wrap"><div class="quote reveal">
      <span class="mark">"</span>
      <blockquote${ed('quote.q')}>${esc(tr(d.quote.q))}</blockquote>
      <div class="by"${ed('quote.by')}>${esc(tr(d.quote.by))}</div>
    </div></div></section>

    <section id="sec-contact"><div class="wrap"><div class="card reveal"><div class="contact">
      <div>
        <h2><span${ed('contact.h1')}>${esc(tr(d.contact.h1))}</span> <em${ed('contact.hem')}>${esc(tr(d.contact.hem))}</em></h2>
        <p class="lead"${ed('contact.lead')}>${esc(tr(d.contact.lead))}</p>
        <a class="btn btn-fill" style="margin-top:26px" href="${esc(d.contact.freqs[0].href)}">${esc(tr(d.contact.cta))} ${I.arrow}</a>
      </div>
      <div class="freq">${d.contact.freqs.map((f,i)=>`
        <a href="${esc(f.href)}" ${String(f.href).startsWith('http')?'target="_blank" rel="noopener noreferrer"':''}>
          <span class="k"${ed('contact.freqs.'+i+'.k')}>${esc(tr(f.k))}</span><span class="v"${ed('contact.freqs.'+i+'.v')}>${esc(tr(f.v))}</span></a>`).join('')}</div>
    </div></div></div></section>

    <footer><div class="wrap"><div class="foot">
      <div class="b">${esc((d.brandFirst+' '+d.brandLast).trim())}</div>
      <div class="meta"><span>© <span id="yr"></span></span><span class="sep">·</span>
        <span>${esc(tr(d.foot.tag))}</span><span class="sep">·</span>
        <span>${esc(tr(d.foot.place))}</span><span class="sep">·</span>
        <span class="owner-link" onclick="ownerTap()">${lang==='cn'?'店主':'Owner'}</span></div>
    </div></div></footer>

    <div class="mmenu" id="mmenu">
      <button class="mx" aria-label="Close" onclick="RMenu()">${I.x}</button>
      <a onclick="RGo('about');RMenu()">${esc(tr(d.nav.about))}</a>
      <a onclick="RGo('work');RMenu()">${esc(tr(d.nav.work))}</a>
      <a onclick="RGo('cred');RMenu()">${esc(tr(d.nav.cred))}</a>
      <a onclick="RGo('contact');RMenu()">${esc(tr(d.nav.contact))}</a>
    </div>`;

    document.getElementById('yr').textContent=new Date().getFullYear();
    wireReveal(); wireNav(); if(editing) wireEdits();
  }

  function entryHTML(base,e){
    return `<div class="entry"><div class="yr"${ed(base+'.yr')}>${esc(tr(e.yr))}</div>
      <h4${ed(base+'.h')}>${esc(tr(e.h))}</h4><div class="org"${ed(base+'.org')}>${esc(tr(e.org))}</div>
      ${e.p?`<p${ed(base+'.p')}>${esc(tr(e.p))}</p>`:''}</div>`;
  }

  // nav / reveal
  window.RGo=function(k){const m={about:'sec-about',work:'sec-work',cred:'sec-cred',contact:'sec-contact'};const el=document.getElementById(m[k]);if(el)el.scrollIntoView({behavior:'smooth'});};
  window.RMenu=function(){document.getElementById('mmenu').classList.toggle('show');};
  window.RLang=function(l){lang=l;saveLang(l);document.body.classList.toggle('lang-cn',l==='cn');document.documentElement.lang=(l==='cn'?'zh':'en');render();if(editing)showBar();};
  function wireNav(){const nav=document.getElementById('nav');const on=()=>nav.classList.toggle('on',window.scrollY>40);on();window.addEventListener('scroll',on,{passive:true});}
  function wireReveal(){
    const els=document.querySelectorAll('.reveal');
    if(!('IntersectionObserver'in window)){els.forEach(e=>e.classList.add('in'));return;}
    const io=new IntersectionObserver(es=>es.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target);}}),{threshold:.1,rootMargin:'0px 0px -6% 0px'});
    els.forEach((e,i)=>{e.style.transitionDelay=Math.min(i%5*50,200)+'ms';io.observe(e);});
  }

  // editing: writes the edited text back into the active language slot
  function setByPath(p,val){
    const parts=p.split('.');let o=data;
    for(let i=0;i<parts.length-1;i++){const k=parts[i];o=o[/^\d+$/.test(k)?+k:k];}
    const last=parts[parts.length-1];const key=/^\d+$/.test(last)?+last:last;
    if(o[key]&&typeof o[key]==='object'&&('en'in o[key])){o[key][lang]=val;}  // bilingual field → set current lang
    else{o[key]=val;}
  }
  function wireEdits(){
    document.querySelectorAll('[data-path]').forEach(el=>{
      el.addEventListener('blur',()=>setByPath(el.getAttribute('data-path'),el.innerText.trim()));
      el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&el.tagName!=='BLOCKQUOTE'&&el.tagName!=='P'){e.preventDefault();el.blur();}});
    });
  }
  function enterEdit(){editing=true;document.body.classList.add('editing');render();showBar();}
  function exitEdit(){editing=false;document.body.classList.remove('editing');render();hideBar();}
  function showBar(){
    let b=document.getElementById('ebar');
    if(!b){b=document.createElement('div');b.className='ebar';b.id='ebar';document.body.appendChild(b);}
    const L=lang==='cn';
    b.innerHTML=`<span class="tg"><span class="p"></span> ${L?'店主模式':'Owner mode'} · ${lang==='cn'?'中文':'EN'}</span>
      <button class="eb" onclick="photoModal()">${I.cam} ${L?'照片':'Photo'}</button>
      <button class="eb save" onclick="saveEdits()">${I.save} ${L?'保存':'Save'}</button>
      <button class="eb" onclick="resetAll()">${L?'重置':'Reset'}</button>
      <button class="eb out" onclick="signOut()">${I.out} ${L?'退出':'Exit'}</button>`;
    requestAnimationFrame(()=>b.classList.add('show'));
  }
  function hideBar(){const b=document.getElementById('ebar');if(b){b.classList.remove('show');setTimeout(()=>b.remove(),500);}}
  window.saveEdits=function(){document.querySelectorAll('[data-path]').forEach(el=>setByPath(el.getAttribute('data-path'),el.innerText.trim()));save();toast(lang==='cn'?'已保存':'Saved');};
  window.resetAll=function(){if(confirm(lang==='cn'?'将所有内容重置为默认？你的修改会被清除。':'Reset all content to default? Your edits will be cleared.')){data=JSON.parse(JSON.stringify(DEFAULT));save();exitEdit();enterEdit();toast(lang==='cn'?'已重置':'Reset to default');}};
  window.signOut=function(){saveEdits();authed=false;exitEdit();toast(lang==='cn'?'已退出':'Signed out');};

  // owner auth
  window.ownerTap=function(){if(authed){editing?exitEdit():enterEdit();return;}getPw()?loginModal():createModal();};
  function modal(html){
    let s=document.getElementById('scrim');
    if(!s){s=document.createElement('div');s.className='scrim';s.id='scrim';document.body.appendChild(s);s.addEventListener('click',e=>{if(e.target===s)closeModal();});}
    s.innerHTML=`<div class="modal">${html}</div>`;requestAnimationFrame(()=>s.classList.add('show'));
    const i=s.querySelector('input');if(i)setTimeout(()=>i.focus(),120);
  }
  window.closeModal=function(){const s=document.getElementById('scrim');if(s){s.classList.remove('show');setTimeout(()=>s.remove(),320);}};
  function createModal(){const L=lang==='cn';
    modal(`<div class="em">${L?'首次设置':'First time'}</div><h3>${L?'设置店主密码':'Set an owner passcode'}</h3>
      <p>${L?'用于在本设备上解锁编辑。无法找回，请妥善保管。':'This unlocks editing on this device. There is no recovery — keep it safe.'}</p>
      <div class="field"><label>${L?'新密码':'New passcode'}</label><input id="p1" type="password" placeholder="${L?'至少 6 个字符':'At least 6 characters'}"></div>
      <div class="field"><label>${L?'确认密码':'Confirm'}</label><input id="p2" type="password" placeholder="${L?'再次输入':'Repeat passcode'}"></div>
      <div id="er" class="errm" style="display:none"></div>
      <div class="rowf"><button class="btn" onclick="closeModal()">${L?'取消':'Cancel'}</button><button class="btn btn-fill" onclick="doCreate()">${L?'设置':'Set passcode'}</button></div>`);
  }
  window.doCreate=async function(){const L=lang==='cn';
    const a=document.getElementById('p1').value,b=document.getElementById('p2').value,er=document.getElementById('er');
    const fail=m=>{er.textContent=m;er.style.display='block';};
    if(a.length<6)return fail(L?'至少 6 个字符。':'Use at least 6 characters.');
    if(a!==b)return fail(L?'两次输入不一致。':"Passcodes don't match.");
    setPw(await sha(a));authed=true;closeModal();enterEdit();toast(L?'店主模式已开启':'Owner mode on');
  };
  function loginModal(){const L=lang==='cn';
    modal(`<div class="em">${L?'店主':'Owner'}</div><h3>${L?'输入密码':'Enter passcode'}</h3>
      <p>${L?'解锁编辑以更新你的内容。':'Unlock editing to update your details.'}</p>
      <div class="field"><label>${L?'密码':'Passcode'}</label><input id="p1" type="password" placeholder="${L?'你的密码':'Your passcode'}"></div>
      <div id="er" class="errm" style="display:none"></div>
      <div class="rowf"><button class="btn" onclick="closeModal()">${L?'取消':'Cancel'}</button><button class="btn btn-fill" onclick="doLogin()">${L?'解锁':'Unlock'}</button></div>`);
    const i=document.getElementById('p1');i.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  }
  window.doLogin=async function(){const L=lang==='cn';
    const v=document.getElementById('p1').value,er=document.getElementById('er');
    if(await sha(v)===getPw()){authed=true;closeModal();enterEdit();toast(L?'店主模式已开启':'Owner mode on');}
    else{er.textContent=L?'密码错误。':'Incorrect passcode.';er.style.display='block';}
  };

  // photo upload (owner)
  window.photoModal=function(){
    if(!authed){getPw()?loginModal():createModal();return;}
    const L=lang==='cn';const has=getPhoto();
    modal(`<div class="em">${L?'头像照片':'Portrait'}</div><h3>${L?'上传你的照片':'Upload your photo'}</h3>
      <p>${L?'选择一张你自己的照片，会显示在首页相框里。仅保存在本设备。':'Pick a photo of yourself — it shows in the hero frame. Saved on this device only.'}</p>
      <div class="drop" id="drop">${I.up}<div class="t">${L?'点击或拖拽照片':'Click or drop a photo'}</div><div class="s">${L?'JPG / PNG · 最大约 3MB':'JPG / PNG · up to ~3MB'}</div></div>
      <input id="file" type="file" accept="image/*" style="display:none">
      <div class="rowf">${has?`<button class="btn" onclick="removePhoto()">${L?'移除照片':'Remove photo'}</button>`:''}<button class="btn btn-fill" onclick="closeModal()">${L?'完成':'Done'}</button></div>`);
    const drop=document.getElementById('drop'),file=document.getElementById('file');
    drop.onclick=()=>file.click();
    file.onchange=e=>{const f=e.target.files[0];if(f)readPhoto(f);};
    ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
    ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
    drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)readPhoto(f);});
  };
  function readPhoto(f){const L=lang==='cn';
    if(f.size>3.5*1024*1024){toast(L?'图片太大（最大约 3MB）':'Image too large (max ~3MB)');return;}
    const r=new FileReader();r.onload=()=>{setPhoto(r.result);render();if(editing)showBar();toast(L?'照片已更新':'Photo updated');closeModal();};r.readAsDataURL(f);
  }
  window.removePhoto=function(){setPhoto("");render();if(editing)showBar();toast(lang==='cn'?'照片已移除':'Photo removed');closeModal();};

  // toast
  let tT;function toast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.className='toast';t.id='toast';document.body.appendChild(t);}t.innerHTML=`${I.save}<span>${esc(msg)}</span>`;requestAnimationFrame(()=>t.classList.add('show'));clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2200);}

  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='e'){e.preventDefault();ownerTap();}
    if(e.key==='Escape'){closeModal();document.getElementById('mmenu')?.classList.remove('show');}
  });

  applyBG();
  document.body.classList.toggle('lang-cn',lang==='cn');
  document.documentElement.lang=(lang==='cn'?'zh':'en');
  render();
})();
</script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
